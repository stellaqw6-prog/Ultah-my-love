<!DOCTYPE html>
<html>
<head>
    <title>Magic Hand Sensor - Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        .menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 10px; }
        button { padding: 10px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 5px; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    <div class="menu">
        <button onclick="setShape('heart')">❤️ Hati</button>
        <button onclick="setShape('planet')">🪐 Planet</button>
        <button onclick="setShape('couple')">👥 Pasangan</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;

        let particles = [];
        let mode = 'heart';

        class Particle {
            constructor() {
                this.x = Math.random() * canvasElement.width;
                this.y = Math.random() * canvasElement.height;
                this.targetX = this.x;
                this.targetY = this.y;
                this.size = Math.random() * 3 + 1;
                this.color = `hsl(${Math.random() * 360}, 70%, 80%)`;
            }
            update(hx, hy) {
                this.x += (this.targetX + hx - this.x) * 0.1;
                this.y += (this.targetY + hy - this.y) * 0.1;
            }
            draw() {
                canvasCtx.fillStyle = this.color;
                canvasCtx.beginPath();
                canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                canvasCtx.fill();
            }
        }

        for(let i=0; i<800; i++) particles.push(new Particle());

        function setShape(newMode) {
            mode = newMode;
            particles.forEach((p, i) => {
                let t = (i / particles.length) * Math.PI * 2;
                if(mode === 'heart') {
                    p.targetX = 16 * Math.pow(Math.sin(t), 3) * 10 + (canvasElement.width/2);
                    p.targetY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 10 + (canvasElement.height/2);
                } else if(mode === 'planet') {
                    p.targetX = Math.cos(t) * 150 + (canvasElement.width/2);
                    p.targetY = Math.sin(t) * 50 + (canvasElement.height/2);
                } else if(mode === 'couple') {
                    p.targetX = (i % 2 === 0 ? -40 : 40) + (canvasElement.width/2);
                    p.targetY = canvasElement.height - (Math.random() * 150 + 100);
                }
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            let hx = 0, hy = 0;
            if (results.multiHandLandmarks.length > 0) {
                hx = (results.multiHandLandmarks[0][8].x - 0.5) * 200;
                hy = (results.multiHandLandmarks[0][8].y - 0.5) * 200;
            }
            particles.forEach(p => { p.update(hx, hy); p.draw(); });
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
        setShape('heart');
    </script>
</body>
</html>
