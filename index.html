<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Hand Particles Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: radial-gradient(circle, #000428 0%, #000000 100%); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; filter: blur(0.5px) contrast(1.2); }
        .ui-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 100; background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        button { padding: 12px 25px; cursor: pointer; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 25px; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .status { position: absolute; top: 20px; right: 20px; color: rgba(255,255,255,0.5); font-size: 12px; }
    </style>
</head>
<body>
    <div class="status" id="status">Kamera: Mencari Tangan...</div>
    <div class="ui-panel">
        <button onclick="setShape('heart')">Hati</button>
        <button onclick="setShape('planet')">Planet</button>
        <button onclick="setShape('couple')">Pasangan</button>
        <button onclick="setShape('star')">Bintang</button>
    </div>
    <video id="input_video" style="display:none"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const ctx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status');
        
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;

        let particles = [];
        let currentMode = 'heart';
        let handX = 0, handY = 0, isHandActive = false;

        class Particle {
            constructor() {
                this.x = Math.random() * canvasElement.width;
                this.y = Math.random() * canvasElement.height;
                this.originX = this.x;
                this.originY = this.y;
                this.vx = 0; this.vy = 0;
                this.size = Math.random() * 2 + 1;
                this.color = `hsl(${Math.random() * 50 + 200}, 80%, 70%)`; // Blue-ish
            }

            update() {
                // Pergerakan halus menuju target
                let dx = this.originX - this.x;
                let dy = this.originY - this.y;
                this.vx = dx * 0.08;
                this.vy = dy * 0.08;

                // Reaksi terhadap tangan (efek magnetis)
                if (isHandActive) {
                    let dmx = handX - this.x;
                    let dmy = handY - this.y;
                    let dist = Math.sqrt(dmx*dmx + dmy*dmy);
                    if (dist < 150) {
                        this.vx -= (dmx / dist) * 2;
                        this.vy -= (dmy / dist) * 2;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Inisialisasi 1200 partikel untuk detail lebih tajam
        for(let i=0; i<1200; i++) particles.push(new Particle());

        function setShape(mode) {
            currentMode = mode;
            particles.forEach((p, i) => {
                let t = (i / particles.length) * Math.PI * 2;
                let cx = canvasElement.width / 2;
                let cy = canvasElement.height / 2;

                if (mode === 'heart') {
                    let r = 13;
                    p.originX = cx + 16 * Math.pow(Math.sin(t), 3) * r;
                    p.originY = cy - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
                    p.color = `hsl(${Math.random() * 20 + 340}, 90%, 60%)`;
                } 
                else if (mode === 'planet') {
                    let r = 180;
                    if (i % 3 === 0) { // Cincin
                        p.originX = cx + Math.cos(t) * r * 1.5;
                        p.originY = cy + Math.sin(t) * 40;
                    } else { // Bola Planet
                        let phi = Math.acos(-1 + (2 * i) / 1200);
                        let theta = Math.sqrt(1200 * Math.PI) * phi;
                        p.originX = cx + Math.cos(theta) * Math.sin(phi) * 100;
                        p.originY = cy + Math.sin(theta) * Math.sin(phi) * 100;
                    }
                    p.color = `hsl(${Math.random() * 40 + 20}, 80%, 60%)`;
                }
                else if (mode === 'star') {
                    let r = (i % 2 === 0) ? 200 : 80;
                    p.originX = cx + r * Math.cos(t * 2.5);
                    p.originY = cy + r * Math.sin(t * 2.5);
                    p.color = "#FFD700";
                }
                else if (mode === 'couple') {
                    if (i < 500) { // Orang 1
                        p.originX = cx - 60 + Math.random() * 20;
                        p.originY = canvasElement.height - (Math.random() * 250);
                    } else if (i < 1000) { // Orang 2
                        p.originX = cx + 60 + Math.random() * 20;
                        p.originY = canvasElement.height - (Math.random() * 250);
                    } else { // Bintang yang ditunjuk
                        p.originX = cx + (Math.random() - 0.5) * canvasElement.width;
                        p.originY = Math.random() * (cy - 100);
                    }
                    p.color = "#ffffff";
                }
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandActive = true;
                statusText.innerText = "Kamera: Tangan Terdeteksi ✨";
                // Titik ujung jari telunjuk
                handX = results.multiHandLandmarks[0][8].x * canvasElement.width;
                handY = results.multiHandLandmarks[0][8].y * canvasElement.height;
            } else {
                isHandActive = false;
                statusText.innerText = "Kamera: Mencari Tangan...";
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        setShape('heart');
        animate();

        window.addEventListener('resize', () => {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            setShape(currentMode);
        });
    </script>
</body>
</html>
